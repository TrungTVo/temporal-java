plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // This dependency is used by the application.
    implementation libs.guava

    implementation 'io.temporal:temporal-sdk:1.35.0'
    runtimeOnly 'org.slf4j:slf4j-simple:1.7.36'
    testImplementation 'io.temporal:temporal-testing:1.35.0'
}

testing {
    suites {
        // Configure the built-in test suite
        test {
            // Use JUnit4 test framework
            useJUnit('4.13.2')
        }
    }
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// Helper tasks to run the worker and the workflows
tasks.register('runWorker', JavaExec) {
    group = 'application'
    description = 'Run the Temporal worker'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'quickstart.MyWorker'
    systemProperties(
        'temporalTarget': providers.gradleProperty('temporalTarget').getOrElse('localhost:7233')
    )
}

tasks.register('runSayHello', JavaExec) {
    group = 'application'
    description = 'Run the SayHelloWorkflow'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'quickstart.StartSayHello'
    systemProperties(
        'temporalTarget': providers.gradleProperty('temporalTarget').getOrElse('localhost:7233')
    )
}

tasks.register('runCustomerOnboard', JavaExec) {
    group = 'application'
    description = 'Run the CustomerOnboardWorkflow'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'quickstart.StartCustomerOnboard'
    systemProperties(
        'temporalTarget': providers.gradleProperty('temporalTarget').getOrElse('localhost:7233')
    )
}
